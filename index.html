<!DOCTYPE html>

<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday My ❤️</title>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(180deg, #ff9a9e, #ff758c, #ff7eb3);
            color: white;
            overflow-x: hidden;
            text-align: center;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 600px;
            z-index: 10;
        }

        h1 {
            font-size: 50px;
        }

        .gift {
            font-size: 100px;
            cursor: pointer;
            animation: bounce 1.5s infinite;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(-15px)
            }
        }

        #photo {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            object-fit: cover;
            border: 6px solid white;
            display: none;
            margin: auto;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.8),
                0 0 40px rgba(255, 105, 180, 0.7),
                0 0 80px rgba(255, 20, 147, 0.6);
            animation: photoGlow 3s ease-in-out infinite alternate;
        }

        @keyframes photoGlow {
            from {
                box-shadow: 0 0 20px rgba(255, 255, 255, 0.7),
                    0 0 40px rgba(255, 105, 180, 0.6),
                    0 0 60px rgba(255, 20, 147, 0.5);
            }

            to {
                box-shadow: 0 0 30px rgba(255, 255, 255, 1),
                    0 0 60px rgba(255, 105, 180, 0.9),
                    0 0 120px rgba(255, 20, 147, 0.8);
            }
        }

        #message {
            font-size: 28px;
            font-weight: 500;
            letter-spacing: 1px;
            opacity: 1;
            transition: opacity 1.5s;
        }

        .slideshow {
            margin-top: 20px;
            display: none;
        }

        .slideshow img {
            width: 250px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
        }

        .balloon {
            position: absolute;
            bottom: -150px;
            width: 70px;
            height: 90px;
            border-radius: 50%;
            animation: floatUp linear infinite;
        }

        .balloon:after {
            content: "";
            position: absolute;
            width: 2px;
            height: 80px;
            background: white;
            top: 90px;
            left: 50%;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0)
            }

            100% {
                transform: translateY(-120vh)
            }
        }

        .heart {
            position: absolute;
            font-size: 22px;
            animation: rise 6s linear infinite;
        }

        @keyframes rise {
            0% {
                transform: translateY(100vh)
            }

            100% {
                transform: translateY(-10vh)
            }
        }

        .cake {
            font-size: 70px;
            margin-top: 20px;
            display: none;
        }

        .final {
            font-size: 26px;
            margin-top: 20px;
            display: none;
        }

        .fadeIn {
            opacity: 1;
        }

        .fadeOut {
            opacity: 0;
        }

        .slideshow img {
            width: 250px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            opacity: 1;
            transition: opacity 1s ease;
        }

        #candle {
            cursor: pointer;
            transition: transform 0.3s;
        }

        #candle:hover {
            transform: scale(1.2);
        }

        #stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 2;
        }

        .slideshow {
            position: relative;
            width: 250px;
            height: 250px;
            margin: auto;
            margin-top: 20px;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 20px;
            opacity: 0;
            transition: opacity 2s ease;
        }

        .slide.active {
            opacity: 1;
        }

        /* MOBILE VIEW */
        @media (max-width: 600px) {

            body {
                padding: 20px;
                height: 100vh;
            }

            .container {
                max-width: 100%;
            }

            h1 {
                font-size: 32px;
            }

            .gift {
                font-size: 70px;
            }

            #photo {
                width: 160px;
                height: 160px;
            }

            #message {
                font-size: 20px;
                padding: 0 10px;
            }

            .slideshow {
                width: 200px;
                height: 200px;
            }

            .slideshow img {
                width: 200px;
            }

            .slide {
                width: 200px;
                height: 200px;
            }

            .cake {
                font-size: 50px;
            }

            .final {
                font-size: 18px;
                padding: 0 15px;
            }

            .balloon {
                width: 50px;
                height: 65px;
            }

        }
    </style>

</head>

<body>
    <canvas id="stars"></canvas>

    <div class="container">

        <div class="gift" onclick="openGift()">Open🎁</div>

        <h1>Happy Birthday My ❤️</h1>

        <img id="photo" src="profile.jpeg">

        <div id="message"></div>

        <div class="slideshow" id="slideshow">
            <img class="slide active" src="foto1.jpeg">
            <img class="slide" src="foto2.jpeg">
            <img class="slide" src="foto3.jpeg">
        </div>

        <div class="cake">
            🎂 <span id="candle" onclick="blowCandle()">🕯️</span>
        </div>

        <div class="final">
            Aku harap kita bisa terus bersama ❤️<br>
            Happy Birthday My Love 💖
        </div>

    </div>

    <audio id="music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3">
    </audio>

    <script>

        let messages = [

            "Selamat ulang tahun sayang ❤️",

            "Terima kasih sudah hadir dalam hidup aku",

            "Kamu membuat dunia aku jauh lebih indah",

            "Aku berharap semua impian kamu tercapai",

            "Dan semoga kita bisa terus bersama",

            "I love you ❤️"

        ];

        let photos = [
            "foto1.jpeg",
            "foto2.jpeg",
            "foto3.jpeg",
            "profile.jpeg"
        ];

        function openGift() {

            document.querySelector(".gift").style.display = "none";

            startSurprise();

        }

        function startSurprise() {

            document.getElementById("music").play();

            document.getElementById("photo").style.display = "block";

            launchConfetti();

            showMessages();

            createBalloons();

            createHearts();

            setTimeout(startSlideshow, messages.length * 3000);

        }

        function showMessages() {

            let index = 0;
            let messageBox = document.getElementById("message");

            messageBox.innerHTML = messages[index];
            messageBox.classList.add("fadeIn");

            index++;

            function nextMessage() {

                messageBox.classList.remove("fadeIn");
                messageBox.classList.add("fadeOut");

                setTimeout(() => {

                    if (index < messages.length) {

                        messageBox.innerHTML = messages[index];

                        messageBox.classList.remove("fadeOut");
                        messageBox.classList.add("fadeIn");

                        index++;

                        setTimeout(nextMessage, 3000);

                    }

                }, 1500);

            }

            setTimeout(nextMessage, 3000);

        }

        function startSlideshow() {

            document.getElementById("slideshow").style.display = "block";

            let slides = document.querySelectorAll(".slide");
            let index = 0;

            setInterval(() => {

                slides[index].classList.remove("active");

                index++;

                if (index >= slides.length) index = 0;

                slides[index].classList.add("active");

            }, 3500);

            document.querySelector(".cake").style.display = "block";

            setTimeout(() => {
                document.querySelector(".final").style.display = "block";
            }, 6000);

        }
        let touchStartX = 0;
        let touchEndX = 0;

        const slideshow = document.getElementById("slideshow");

        slideshow.addEventListener("touchstart", e => {
            touchStartX = e.changedTouches[0].screenX;
        });

        slideshow.addEventListener("touchend", e => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        });

        function handleSwipe() {

            let slides = document.querySelectorAll(".slide");

            let current = 0;

            slides.forEach((s, i) => {
                if (s.classList.contains("active")) current = i;
            });

            if (touchEndX < touchStartX) {

                slides[current].classList.remove("active");
                current++;

                if (current >= slides.length) current = 0;

                slides[current].classList.add("active");

            }

            if (touchEndX > touchStartX) {

                slides[current].classList.remove("active");
                current--;

                if (current < 0) current = slides.length - 1;

                slides[current].classList.add("active");

            }

        }

        function createBalloons() {

            for (let i = 0; i < 25; i++) {

                let balloon = document.createElement("div");

                balloon.className = "balloon";

                balloon.style.left = Math.random() * 100 + "vw";

                balloon.style.background = `hsl(${Math.random() * 360},70%,60%)`;

                balloon.style.animationDuration = (6 + Math.random() * 6) + "s";

                document.body.appendChild(balloon);

            }

        }

        function createHearts() {

            setInterval(() => {

                let heart = document.createElement("div");

                heart.className = "heart";

                heart.innerHTML = "❤️";

                heart.style.left = Math.random() * 100 + "vw";

                heart.style.fontSize = (20 + Math.random() * 25) + "px";

                heart.style.animationDuration = (4 + Math.random() * 3) + "s";

                document.body.appendChild(heart);

            }, 300);

        }

        function launchConfetti() {

            var duration = 8 * 1000;

            var animationEnd = Date.now() + duration;

            (function frame() {

                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 }
                });

                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 }
                });

                if (Date.now() < animationEnd) {
                    requestAnimationFrame(frame);
                }

            }());

        }
        function blowCandle() {

            document.getElementById("candle").innerHTML = "💨";

            confetti({
                particleCount: 150,
                spread: 120,
                origin: { y: 0.6 }
            });

        }

        const canvas = document.getElementById("stars");
        const ctx = canvas.getContext("2d");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let stars = [];

        for (let i = 0; i < 120; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2,
                speed: Math.random() * 0.5
            });
        }

        function animateStars() {

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#fff5f7";

            stars.forEach(star => {

                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();

                star.y += star.speed;

                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }

            });

            requestAnimationFrame(animateStars);
        }

        animateStars();

        document.addEventListener("click", function (e) {

            confetti({
                particleCount: 80,
                spread: 90,
                origin: {
                    x: e.clientX / window.innerWidth,
                    y: e.clientY / window.innerHeight
                }
            });

        });

    </script>

</body>

</html>
