<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday My Love ❤️</title>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body {
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;

            /* Pink overlay + image */
            background:
                linear-gradient(rgba(255, 154, 158, 0.85), rgba(255, 126, 179, 0.85)),
                url("bubu-dudu.png");

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            color: white;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;


            padding: 30px;
            border-radius: 20px;
        }

        h1 {
            font-size: 42px;
        }

        .gift {
            font-size: 90px;
            cursor: pointer;
            animation: bounce 1.5s infinite;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(-15px)
            }
        }

        #photo {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            border: 6px solid white;
            display: none;
            margin: auto;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.8),
                0 0 60px rgba(255, 20, 147, 0.7);
            animation: glow 3s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from {
                box-shadow: 0 0 20px rgba(255, 255, 255, 0.6),
                    0 0 40px rgba(255, 20, 147, 0.6);
            }

            to {
                box-shadow: 0 0 35px rgba(255, 255, 255, 1),
                    0 0 80px rgba(255, 20, 147, 0.9);
            }
        }

        #message {
            font-size: 26px;
            margin-top: 20px;
            opacity: 1;
            transition: opacity 1.5s;
        }

        .fadeOut {
            opacity: 0;
        }

        .slideshow {
            position: relative;
            width: 250px;
            height: 250px;
            margin: 20px auto;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 20px;
            opacity: 0;
            transition: opacity 2s ease;
            animation: kenburns 10s ease-in-out infinite alternate;
        }

        .slide.active {
            opacity: 1;
        }

        .final {
            font-size: 24px;
            margin-top: 20px;
            display: none;
        }

        #stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        @keyframes kenburns {
            0% {
                transform: scale(1);
            }

            100% {
                transform: scale(1.15);
            }
        }

        @media (max-width: 600px) {

            h1 {
                font-size: 28px;
            }

            .container {
                max-width: 90%;
                padding: 20px;
            }

            .gift {
                font-size: 70px;
            }

            #photo {
                width: 150px;
                height: 150px;
            }

            #message {
                font-size: 18px;
                margin-top: 15px;
            }

            .slideshow {
                width: 200px;
                height: 200px;
            }

            .slide {
                width: 100%;
                height: 100%;
            }

            .final {
                font-size: 18px;
                margin-top: 15px;
            }

        }
    </style>
</head>

<body>

    <canvas id="stars"></canvas>

    <div class="container">

        <div class="gift" onclick="openGift()">🎁</div>

        <h1>Happy Birthday My Love ❤️</h1>

        <img id="photo" src="profile.jpeg">

        <div id="message"></div>

        <div class="slideshow" id="slideshow">
            <img class="slide active" src="foto1.jpeg">
            <img class="slide" src="foto2.jpeg">
            <img class="slide" src="foto3.jpeg">
        </div>

        <div class="final">
            Aku harap kita bisa terus bersama ❤️<br>
            Happy Birthday Sayang 💖
        </div>

    </div>

    <audio id="music" loop>
        <source src="https://www.orangefreesounds.com/wp-content/uploads/2016/08/Happy-birthday-instrumental.mp3">
    </audio>

    <script>

        /* MESSAGE */

        let messages = [
            "Selamat ulang tahun sayang ❤️",
            "Panjang umur sehat selalu",
            "Semoga semua impianmu tercapai",
            "Terima kasih sudah hadir di hidupku",
            "Aku sangat bersyukur memilikimu",
            "I love you ❤️"
        ];

        /* OPEN GIFT */

        function openGift() {

            document.querySelector(".gift").style.display = "none";

            document.getElementById("photo").style.display = "block";

            document.getElementById("music").play();
            document.getElementById("music").volume = 0.4;

            launchConfetti();

            showMessages();

        }

        /* MESSAGE ANIMATION */

        function showMessages() {

            let index = 0;
            let box = document.getElementById("message");

            function next() {

                box.innerHTML = messages[index];

                box.style.opacity = 1;

                setTimeout(() => {

                    box.style.opacity = 0;

                    setTimeout(() => {

                        index++;

                        if (index < messages.length) {

                            next();

                        } else {

                            startSlideshow();

                        }

                    }, 1500);

                }, 2000);

            }

            next();

        }

        /* SLIDESHOW */

        let slides;
        let slideIndex = 0;

        function startSlideshow() {

            document.getElementById("slideshow").style.display = "block";

            slides = document.querySelectorAll(".slide");

            setInterval(() => {

                slides[slideIndex].classList.remove("active");

                slideIndex++;

                if (slideIndex >= slides.length) slideIndex = 0;

                slides[slideIndex].classList.add("active");

            }, 4000);

            setTimeout(() => {

                document.querySelector(".final").style.display = "block";

            }, 7000);

        }

        /* CONFETTI */

        function launchConfetti() {

            var duration = 1 * 300;

            var end = Date.now() + duration;

            (function frame() {

                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 }
                });

                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 }
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }

            })();

        }

        /* TAP CONFETTI */

        document.addEventListener("click", function (e) {

            confetti({
                particleCount: 80,
                spread: 90,
                origin: {
                    x: e.clientX / window.innerWidth,
                    y: e.clientY / window.innerHeight
                }
            });

        });

        /* STARS BACKGROUND */

        const canvas = document.getElementById("stars");
        const ctx = canvas.getContext("2d");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let stars = [];

        for (let i = 0; i < 120; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2,
                speed: Math.random() * 0.5
            });
        }

        function animateStars() {

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#fff";

            stars.forEach(star => {

                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();

                star.y += star.speed;

                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }

            });

            requestAnimationFrame(animateStars);

        }

        animateStars();

        document.getElementById("slideshow").style.display = "flex";

    </script>

</body>

</html>
